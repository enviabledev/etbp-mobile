name: etbp_mobile
description: "Enviable Transport - Book bus tickets across Nigeria"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State Management
  flutter_riverpod: ^2.5.1
  # Navigation
  go_router: ^14.2.0
  # Networking
  dio: ^5.4.3+1
  # Local Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  # UI
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  # QR Code
  qr_flutter: ^4.1.0
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  # Sharing & Files
  share_plus: ^10.0.4
  path_provider: ^2.1.3
  # Payment
  webview_flutter: ^4.7.0
  # Push Notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.1
  # Social & Biometric Auth
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  local_auth: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
